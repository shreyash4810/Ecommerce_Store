trigger:
- main

pool:
  name: java-agent
  demands:
    - Agent.Name -equals e-agent
stages:
- stage: Build
  displayName: compile
  jobs:
    - job: compile
      steps:
      - task: Maven@4
        inputs:
          mavenPomFile: 'Ecommerce_Store/pom.xml'
          goals: 'clean package -DskipTests'
          publishJUnitResults: false
          javaHomeOption: 'JDKVersion'
          mavenVersionOption: 'Default'
          mavenAuthenticateFeed: false
          effectivePomSkip: false
          sonarQubeRunAnalysis: false
      - task: PublishBuildArtifacts@1
        displayName: 'Publish WAR Artifact'
        inputs:
          PathtoPublish: 'Ecommerce_Store/target'
          ArtifactName: 'drop'
          publishLocation: 'Container'

- stage: test
  displayName: test 

  jobs:
   - job: test
     steps:
       - task: Maven@4
         inputs:
           azureSubscription: 'Aks-ecommerce'
           mavenPomFile: 'Ecommerce_Store/pom.xml'
           goals: 'test -DskipTests'
           publishJUnitResults: false
           javaHomeOption: 'JDKVersion'
           mavenVersionOption: 'Default'
           mavenAuthenticateFeed: false
           effectivePomSkip: false
           sonarQubeRunAnalysis: false


- stage: 
  displayName: docker

  jobs:
  - job: BuildAndPush
    displayName: Build and Push

    steps:
      - task: DownloadBuildArtifacts@1
        displayName: 'Download Build Artifact'
        inputs:
          buildType: 'current'
          downloadType: 'single'
          artifactName: 'drop'
          downloadPath: '$(Build.SourcesDirectory)/Ecommerce_Store'
      - script: |
          echo "Downloaded files:"
          ls -R $(Build.SourcesDirectory)/Ecommerce_Store
        displayName: 'Verify Artifact'

      - task: Docker@2
        inputs:
          containerRegistry: 'acr-terraform'
          repository: 'ecommerce-store'
          command: 'buildAndPush'
          Dockerfile: '$(Build.SourcesDirectory)/Ecommerce_Store/dockerfile'
          buildContext: '$(Build.SourcesDirectory)/Ecommerce_Store'
          tags: |
            latest