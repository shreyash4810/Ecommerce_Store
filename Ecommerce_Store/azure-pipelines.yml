trigger:
- main

pool:
  name: java-agent
  demands:
    - Agent.Name -equals e-agent
stages:
- stage: Build
  displayName: compile
  jobs:
    - job: compile
      steps:
      - task: Maven@4
        inputs:
          mavenPomFile: 'Ecommerce_Store/pom.xml'
          goals: 'clean package -DskipTests'
          publishJUnitResults: false
          javaHomeOption: 'JDKVersion'
          mavenVersionOption: 'Default'
          mavenAuthenticateFeed: false
          effectivePomSkip: false
          sonarQubeRunAnalysis: false
 
- stage: test
  displayName: test 

  jobs:
   - job: test
     steps:
       - task: Maven@4
         inputs:
           azureSubscription: 'Aks-ecommerce'
           mavenPomFile: 'Ecommerce_Store/pom.xml'
           goals: 'test -DskipTests'
           publishJUnitResults: false
           javaHomeOption: 'JDKVersion'
           mavenVersionOption: 'Default'
           mavenAuthenticateFeed: false
           effectivePomSkip: false
           sonarQubeRunAnalysis: false


- stage: 
  displayName: docker

  jobs:
  - job: BuildAndPush
    displayName: Build and Push

    steps:
      - script: |
          echo "Current Directory:"
          pwd
          
          echo "Repository Structure:"
          ls -R

          echo "WAR files:"
          find . -name "*.war"
        displayName: 'Debug Repository'
    

      - task: Docker@2
        inputs:
          containerRegistry: 'acr-terraform'
          repository: 'ecommerce-store'
          command: 'buildAndPush'
          Dockerfile: '$(Build.SourcesDirectory)/dockerfile'
          buildContext: '$(Build.SourcesDirectory)'